<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honda Bintaro - Product Lineup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* === CSS VARIABLES (THEME MANAGEMENT) === */
        :root {
            /* Light / Normal Mode */
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --bg-callout: #f1f3f5;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #e9ecef;
            --primary-red: #cc0000;
            --primary-hover: #a30000;
            --badge-bg: #e9ecef;
            --badge-text: #495057;
            --shadow: 0 4px 6px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.02);
            --shadow-hover: 0 10px 20px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            /* Night Mode (Soft Dark, tidak hitam pekat) */
            --bg-body: #1e1e1e;
            --bg-card: #2d2d2d;
            --bg-callout: #373737;
            --text-main: #f8f9fa;
            --text-muted: #b2b2b2;
            --border-color: #3d3d3d;
            --primary-red: #ff3333;
            --primary-hover: #ff6666;
            --badge-bg: #3d3d3d;
            --badge-text: #e0e0e0;
            --shadow: 0 4px 6px rgba(0,0,0,0.2);
            --shadow-hover: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* === GLOBAL STYLES === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* === HEADER SECTION === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .brand h1 span {
            color: var(--primary-red);
        }
        .brand p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Night Mode Toggle Button */
        .theme-toggle-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }
        .theme-toggle-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        /* === SPA VIEW TRANSITIONS === */
        .view-section {
            display: none;
            animation: fadeIn 0.4s ease-in-out forwards;
        }
        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === MAIN VIEW: CATALOG GRID === */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .card-img-wrapper {
            position: relative;
            padding-top: 60px;
            background-color: #eaeaea;
            overflow: hidden;
            height: 180px;
        }
        .card-img-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-price {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--primary-red);
            margin-bottom: 15px;
        }

        .card-specs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
        }
        .spec-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
        }

        /* === DETAIL VIEW === */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }
        .back-btn:hover { background-color: var(--bg-callout); }

        .detail-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .detail-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        .detail-gallery img {
            width: 100%;
            border-radius: 12px;
            box-shadow: var(--shadow);
            object-fit: cover;
        }

        .detail-info h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .price-box {
            background-color: var(--bg-callout);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }
        .price-box div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        .price-box div:last-child { margin-bottom: 0; }
        .price-box .main-p {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-red);
        }

        .variant-box {
            margin-bottom: 25px;
        }
        .variant-box h4 { margin-bottom: 8px; font-size: 0.95rem; color: var(--text-muted); }
        .variant-list {
            list-style: none;
        }
        .variant-list li {
            padding: 8px 12px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        .rich-description {
            font-size: 0.95rem;
            color: var(--text-main);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        .rich-description p { margin-bottom: 12px; }
        .rich-description b { color: var(--primary-red); }

        /* Loading & Error States */
        .status-msg {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Mobile Friendly Adjustments */
        @media (max-width: 576px) {
            header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .theme-toggle-btn { align-self: flex-end; margin-top: -40px; }
            .detail-info h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand">
                <h1>Honda <span>Bintaro</span></h1>
                <p>Katalog Produk Digital & Lineup Unit</p>
            </div>
            <button id="theme-toggle" class="theme-toggle-btn">
                <span id="theme-icon">🌙</span> <span id="theme-text">Night Mode</span>
            </button>
        </header>

        <main id="view-catalog" class="view-section active">
            <div class="product-grid" id="catalog-container">
                <p class="status-msg">Memuat data produk Honda...</p>
            </div>
        </main>

        <main id="view-detail" class="view-section">
            <button class="back-btn" onclick="showCatalogView()">
                ← Kembali ke Katalog
            </button>
            
            <div class="detail-layout">
                <div class="detail-gallery">
                    <img id="detail-main-img" src="" alt="Product Image">
                </div>
                
                <div class="detail-info">
                    <h2 id="detail-name">Nama Mobil</h2>
                    
                    <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                        <span class="spec-badge" id="detail-badge-engine">Mesin</span>
                        <span class="spec-badge" id="detail-badge-seats">Kursi</span>
                    </div>

                    <div class="price-box">
                        <div>
                            <span>Harga OTR Mulai:</span>
                            <span class="main-p" id="detail-price">Rp -</span>
                        </div>
                        <div>
                            <span>Simulasi DP:</span>
                            <span style="font-weight: 600;" id="detail-dp">Rp -</span>
                        </div>
                        <div>
                            <span>Angsuran:</span>
                            <span style="font-weight: 600;" id="detail-angsuran">Rp -</span>
                        </div>
                    </div>

                    <div class="variant-box">
                        <h4>Pilihan Varian & OTR:</h4>
                        <ul class="variant-list" id="detail-variants">
                            </ul>
                    </div>

                    <div class="rich-description" id="detail-description">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Database penampung data dari fetch
        let productsData = {};

        // Format Angka ke Rupiah OTR otomatis
        function formatRupiah(num) {
            if(!num) return "Hubungi Dealer";
            return "Rp " + new Intl.NumberFormat('id-ID').format(num);
        }

        // AJAX / Fetch Data dari file eksternal products.json
        async function fetchProductsJSON() {
            const container = document.getElementById('catalog-container');
            try {
                // Mengambil file json lokal yang berada di folder yang sama
                const response = await fetch('/json/products.json');
                if (!response.ok) throw new Error('File JSON tidak ditemukan');
                
                productsData = await response.json();
                renderCatalog();
            } catch (error) {
                console.error("Error loading JSON:", error);
                container.innerHTML = `<p class="status-msg" style="color: var(--primary-red);">Gagal memuat katalog. Pastikan file 'products.json' sudah diunggah di repository yang sama.</p>`;
            }
        }

        // RENDER KATALOG MOBIL DI HALAMAN DEPAN
        const catalogContainer = document.getElementById('catalog-container');

        function renderCatalog() {
            catalogContainer.innerHTML = '';
            
            if (Object.keys(productsData).length === 0) {
                catalogContainer.innerHTML = '<p class="status-msg">Tidak ada data produk saat ini.</p>';
                return;
            }

            for (let key in productsData) {
                const car = productsData[key];
                const thumbImg = car.images && car.images.length > 0 ? car.images[0].thumb : 'https://placehold.co/400x250';
                
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => showDetailView(key);

                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <img src="${thumbImg}" alt="${car.name}" loading="lazy">
                    </div>
                    <div class="card-body">
                        <div class="card-title">${car.name}</div>
                        <div class="card-price">${formatRupiah(car.price)}</div>
                        <div class="card-specs">
                            <span class="spec-badge">⚙️ ${car.seats}</span>
                            <span class="spec-badge">📦 ${car.engine.split('+')[0].trim()}</span>
                        </div>
                    </div>
                `;
                catalogContainer.appendChild(card);
            }
        }

        // LOGIKA DETIL SPA
        const viewCatalog = document.getElementById('view-catalog');
        const viewDetail = document.getElementById('view-detail');

        function showDetailView(key) {
            const car = productsData[key];
            if(!car) return;

            document.getElementById('detail-name').innerText = car.name;
            document.getElementById('detail-price').innerText = formatRupiah(car.price);
            document.getElementById('detail-dp').innerText = car.dp;
            document.getElementById('detail-angsuran').innerText = car.angsuran;
            document.getElementById('detail-badge-engine').innerText = "Mesin: " + car.engine;
            document.getElementById('detail-badge-seats').innerText = "Kapasitas: " + car.seats;
            document.getElementById('detail-description').innerHTML = car.description;

            const fullImg = car.images && car.images.length > 0 ? car.images[0].full : 'https://placehold.co/600x400';
            document.getElementById('detail-main-img').src = fullImg;

            const variantContainer = document.getElementById('detail-variants');
            variantContainer.innerHTML = '';
            car.variants.forEach(variant => {
                const li = document.createElement('li');
                li.innerText = variant;
                variantContainer.appendChild(li);
            });

            viewCatalog.classList.remove('active');
            viewDetail.classList.add('active');
            window.scrollTo(0, 0);
        }

        function showCatalogView() {
            viewDetail.classList.remove('active');
            viewCatalog.classList.add('active');
            window.scrollTo(0, 0);
        }

        // LOGIKA TOGGLE NIGHT / LIGHT MODE
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        const bodyEl = document.body;

        if (localStorage.getItem('honda-theme') === 'dark') {
            bodyEl.setAttribute('data-theme', 'dark');
            themeIcon.innerText = '☀️';
            themeText.innerText = 'Normal Mode';
        }

        themeToggleBtn.addEventListener('click', () => {
            if (bodyEl.getAttribute('data-theme') === 'dark') {
                bodyEl.removeAttribute('data-theme');
                localStorage.setItem('honda-theme', 'light');
                themeIcon.innerText = '🌙';
                themeText.innerText = 'Night Mode';
            } else {
                bodyEl.setAttribute('data-theme', 'dark');
                localStorage.setItem('honda-theme', 'dark');
                themeIcon.innerText = '☀️';
                themeText.innerText = 'Normal Mode';
            }
        });

        // Jalankan Fetch Data saat DOM siap
        document.addEventListener("DOMContentLoaded", () => {
            fetchProductsJSON();
        });
    </script>
</body>
</html>
